<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ridda.ai — PokeMenu Launchpad · PokeBro NFT · Digital Collectibles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e14;
      --bg-panel: #0f1419;
      --bg-card: #151b24;
      --border: #1e2836;
      --border-soft: #171d28;
      --accent: #00d4aa;
      --accent-dim: #00b894;
      --launch: #7c3aed;
      --launch-dim: #6d28d9;
      --nft: #f59e0b;
      --nft-dim: #d97706;
      --text: #e6edf3;
      --text-dim: #7d8590;
      --glow-accent: rgba(0, 212, 170, 0.12);
      --glow-launch: rgba(124, 58, 237, 0.12);
      --radius: 14px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
      background-image: radial-gradient(ellipse 85% 55% at 50% -15%, rgba(0, 212, 170, 0.06), transparent 45%),
        radial-gradient(ellipse 60% 35% at 100% 50%, rgba(124, 58, 237, 0.05), transparent 40%);
    }
    .app { max-width: 980px; margin: 0 auto; padding: 1.6rem 1.25rem; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 0 1.5rem;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 1.5rem;
    }
    .logo { font-weight: 800; font-size: 1.85rem; color: var(--accent); letter-spacing: 0.02em; }
    .tagline { font-size: 0.82rem; color: var(--text-dim); margin-top: 0.3rem; }
    .header-right { display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap; }
    .wallet-addr { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--nft); max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
    .contract-in { width: 200px; padding: 0.5rem 0.7rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; background: var(--bg-panel); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); }
    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      padding: 0.55rem 1.05rem;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
    }
    .btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .btn.primary { background: var(--launch-dim); border-color: var(--launch); color: #fff; }
    .btn.primary:hover { box-shadow: 0 0 18px var(--glow-launch); }
    .btn.accent { border-color: var(--accent-dim); color: var(--accent); }
    .btn.accent:hover { box-shadow: 0 0 14px var(--glow-accent); }
    .btn.small { padding: 0.4rem 0.8rem; font-size: 0.86rem; }

    .hero {
      text-align: center;
      padding: 2.25rem 1.25rem;
      background: linear-gradient(180deg, var(--bg-card) 0%, transparent 100%);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
    }
    .hero h1 { font-size: 1.7rem; font-weight: 700; color: var(--text); margin-bottom: 0.55rem; }
    .hero p { color: var(--text-dim); font-size: 0.96rem; max-width: 44ch; margin: 0 auto; }

    .stats-row { display: flex; flex-wrap: wrap; gap: 0.9rem; margin-bottom: 1.5rem; }
    .stat-card { flex: 1; min-width: 145px; padding: 1.05rem; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: var(--radius-sm); }
    .stat-card .label { font-size: 0.73rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
